# LingShu 配置文件

models:
  elite: ["claude-sonnet-4", "gpt-4.1"]
  strong: ["claude-sonnet-4", "gpt-4o", "deepseek-r1"]
  medium: ["gpt-4o", "deepseek-chat"]
  light: ["gpt-4o-mini", "deepseek-chat", "gemini-2.0-flash"]
  local: ["ollama/qwen2.5-coder:7b"]

fallback:
  max_retries: 3
  allow_downgrade: true

plugins:
  enabled: true
  phases:
    evidence_collection:
      - trailmark_callgraph
      - codebadger_inspect
    post_execution:
      - diting_verify
  trailmark:
    enabled: true
    auto_trigger: true
  codebadger:
    enabled: true
    auto_trigger: true
  diting:
    enabled: true
    depth: "medium"
    min_complexity: "moderate"

execution:
  max_rounds: 3
  max_recovery_attempts: 10
  checkpoint_enabled: true

logging:
  level: "DEBUG"
  file: "lingshu.log"